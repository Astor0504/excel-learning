<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Excel 學習教練 — macOS 版</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;800&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #56d364;
    --accent2: #79c0ff;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --user-bubble: #1f3a5f;
    --coach-bubble: #1a2332;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-header .logo {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .sidebar-header .logo span { color: var(--accent2); }

  .sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .sidebar-close {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  .progress-bar-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .chapter-list::-webkit-scrollbar { width: 5px; }
  .chapter-list::-webkit-scrollbar-track { background: transparent; }
  .chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chapter-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
  }

  .chapter-item:hover { background: var(--surface2); }
  .chapter-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .chapter-item.done .ch-title { opacity: 0.6; }

  .ch-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    width: 100%;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ch-title { font-size: 13px; flex: 1; }

  .ch-done-badge {
    font-size: 11px;
    color: var(--accent);
    font-weight: bold;
  }

  .phase-divider {
    padding: 12px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* OVERLAY for mobile sidebar */
  #sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 8px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-title span {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 8px;
  }

  .topbar-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .btn-action {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
    white-space: nowrap;
  }

  .btn-action:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-action.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .btn-action.primary:hover { opacity: 0.85; }

  /* CHAT AREA */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #chat-area::-webkit-scrollbar { width: 6px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.coach { align-self: flex-start; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .avatar.coach { background: var(--surface2); }
  .avatar.user { background: var(--user-bubble); }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }

  .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.coach .bubble { background: var(--coach-bubble); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

  .bubble h3 { color: var(--accent2); font-size: 14px; margin: 12px 0 6px; }
  .bubble h3:first-child { margin-top: 0; }
  .bubble strong { color: var(--accent2); }
  .bubble em { color: var(--accent4); font-style: normal; }
  .bubble code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent3); }

  .code-block-wrap {
    position: relative;
    margin: 10px 0;
  }

  .code-block-wrap pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 0;
  }

  .code-block-wrap pre code { background: none; padding: 0; color: var(--text); font-size: 12px; line-height: 1.6; }

  .copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'JetBrains Mono', monospace;
  }

  .code-block-wrap:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  .lang-label {
    position: absolute;
    top: 6px;
    right: 60px;
    font-size: 9px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  .bubble ul { margin: 6px 0; padding-left: 18px; }
  .bubble li { margin: 3px 0; }
  .bubble p { margin: 6px 0; }
  .bubble p:first-child { margin-top: 0; }

  .highlight-box {
    background: rgba(121,192,255,0.08);
    border-left: 3px solid var(--accent2);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
  }

  .quiz-box {
    background: rgba(210,168,255,0.08);
    border-left: 3px solid var(--accent4);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
  }

  .quiz-title {
    font-weight: 700;
    color: var(--accent4);
    font-size: 13px;
    margin-bottom: 4px;
  }

  .error-box {
    background: rgba(247,129,102,0.1);
    border-left: 3px solid var(--accent3);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 12px;
    color: var(--accent3);
    font-family: 'JetBrains Mono', monospace;
  }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .dot {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  /* WELCOME */
  .welcome-card {
    align-self: center;
    text-align: center;
    padding: 48px 32px;
    max-width: 520px;
  }

  .wc-emoji { font-size: 56px; margin-bottom: 16px; }

  .welcome-card h2 {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-card p { color: var(--text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 24px; }

  .start-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

  .start-chip {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .start-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* QUICK REPLIES */
  #quick-replies {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 20px;
    min-height: 0;
  }

  .chip {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover { border-color: var(--accent2); color: var(--accent2); }

  /* INPUT */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent2); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.8; }
  #send-btn:disabled { opacity: 0.3; cursor: default; }

  #send-btn svg { width: 16px; height: 16px; fill: var(--bg); }

  .input-hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; }
    .sidebar-close { display: block; }
    .menu-btn { display: flex; }
    .msg { max-width: 95%; }
    .welcome-card { padding: 32px 16px; }
    .topbar-title { font-size: 13px; }
    .btn-action { padding: 6px 10px; font-size: 11px; }
  }

  .speak-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speak-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
<script defer src="/_vercel/insights/script.js"></script></head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar" role="tablist" aria-label="章節選單">
  <div class="sidebar-header">
    <div>
      <div class="logo">Excel<span>Coach</span></div>
      <div class="subtitle">macOS Excel 專業養成教練</div>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()" aria-label="關閉選單">&times;</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>學習進度</span>
      <span id="prog-text">0 / 21 階段</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="chapter-list" id="chapter-list"></div>
</div>

<div id="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" onclick="openSidebar()" aria-label="開啟選單">&#9776;</button>
      <div class="topbar-title" id="current-title">選擇章節開始學習</div>
    </div>
    <div class="topbar-actions">
      <button class="btn-action" onclick="clearChat()">清除對話</button>
      <button class="btn-action primary" onclick="markDone()">&#10003; 學完了！</button>
    </div>
  </div>

  <div id="chat-area">
    <div class="welcome-card">
      <div class="wc-emoji">📊</div>
      <h2>Excel 學習教練</h2>
      <p>
        從基礎函式到 VBA 自動化，跟著 AI 教練一步步成為 Excel 高手。<br>
        搭配「互動練習」和「專業養成」Excel 檔案一起使用效果更好！
      </p>
      <div class="start-chips">
        <button class="start-chip" onclick="startLesson(0)">🚀 從頭開始學</button>
        <button class="start-chip" onclick="askQuestion('SUM 跟 SUMIF 差在哪？用最簡單的方式解釋')">📊 SUM vs SUMIF？</button>
        <button class="start-chip" onclick="askQuestion('VLOOKUP 跟 XLOOKUP 有什麼差別？什麼時候該用哪個？')">🔍 VLOOKUP vs XLOOKUP</button>
        <button class="start-chip" onclick="startLesson(15)">⚡ Power Query</button>
        <button class="start-chip" onclick="startLesson(17)">⚙️ VBA 入門</button>
      </div>
    </div>
  </div>

  <div id="quick-replies"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="問我任何 Excel 問題，或貼上你的公式讓我幫你檢查..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="送出" aria-label="送出訊息">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter 送出 / Shift+Enter 換行 — 可貼上公式讓教練幫你分析</div>
  </div>
</div>

<script>
function getApiKey() {
  const _a = 'c2stYW50LWFwaTAzLWNSTl9vcF9WaEdGVVp6NEpRUlg0SjZNdmdRaUFOUmFyQ0JIMG5TSElu';
  const _b = 'BFUQphjeflVLnhTaJRjcidXd5EWar9FMYxGSVRXZWZ1T3AHb0MXRHFnYxcjR29Gdnp2Ymx2Z';
  return atob(_a + _b.split('').reverse().join(''));
}

// ════════════════════════════════════════════════════════
// 章節定義 — 對應 Excel專業養成 21 階段
// ════════════════════════════════════════════════════════
const CHAPTERS = [
  // Phase 1: 操作效率
  { id: 0, phase: 1, num: "P1-01", title: "macOS 快捷鍵大全", emoji: "⌨️",
    context: "macOS Excel 快捷鍵、Command/Option/Control 對應、導航/選取/編輯/格式化、KeyTips、與 Windows 差異" },
  { id: 1, phase: 1, num: "P1-02", title: "基礎函式", emoji: "📊",
    context: "SUM、AVERAGE、COUNT/COUNTA、MAX、MIN、MEDIAN、LARGE/SMALL" },
  { id: 2, phase: 1, num: "P1-03", title: "條件判斷", emoji: "📐",
    context: "IF、IFS、巢狀 IF、AND、OR、NOT、MOD" },

  // Phase 2: 職場即戰力
  { id: 3, phase: 2, num: "P2-01", title: "條件統計", emoji: "📈",
    context: "COUNTIF/COUNTIFS、SUMIF/SUMIFS、AVERAGEIF/AVERAGEIFS" },
  { id: 4, phase: 2, num: "P2-02", title: "查找比對", emoji: "🔍",
    context: "VLOOKUP、XLOOKUP、INDEX+MATCH、IFERROR、MATCH" },
  { id: 5, phase: 2, num: "P2-03", title: "樞紐分析表", emoji: "📊",
    context: "建立樞紐、4 大區域（列/欄/值/篩選）、群組、計算欄位、交叉分析篩選器、資料模型" },
  { id: 6, phase: 2, num: "P2-04", title: "條件式格式化", emoji: "🎨",
    context: "資料橫條、色階、圖示集、自訂公式規則" },

  // Phase 3: 專業打磨
  { id: 7, phase: 3, num: "P3-01", title: "資料驗證", emoji: "✅",
    context: "下拉選單、串聯下拉、輸入訊息、錯誤警示" },
  { id: 8, phase: 3, num: "P3-02", title: "文字與日期函式", emoji: "📝",
    context: "TRIM、MID、FIND、TEXT、DATEDIF、WORKDAY、EOMONTH、SUBSTITUTE" },
  { id: 9, phase: 3, num: "P3-03", title: "圖表設計", emoji: "📈",
    context: "圖表類型選擇、設計原則、走勢圖 Sparklines、動態圖表" },
  { id: 10, phase: 3, num: "P3-04", title: "命名範圍與表格", emoji: "🔗",
    context: "命名範圍、結構化參照、自動展開表格" },
  { id: 11, phase: 3, num: "P3-05", title: "保護與安全", emoji: "🛡️",
    context: "儲存格鎖定、工作表/活頁簿保護、檔案密碼" },

  // Phase 4: 進階自動化
  { id: 12, phase: 4, num: "P4-01", title: "陣列與動態函式", emoji: "📊",
    context: "FILTER、SORT、UNIQUE、SEQUENCE、TAKE（Microsoft 365 功能）、SUMPRODUCT" },
  { id: 13, phase: 4, num: "P4-02", title: "進階函式", emoji: "🧮",
    context: "INDIRECT、OFFSET、LET、AGGREGATE、CHOOSE、SWITCH、LAMBDA" },

const PHASE_NAMES = {

  2: "Phase 2 — 職場即戰力",
  3: "Phase 3 — 專業打磨",

};

let currentChapter = null;
let done = new Set(JSON.parse(localStorage.getItem('excel_done') || '[]'));
let history = [];
let isLoading = false;

const SYSTEM_PROMPT = `你是一位專業、耐心的 Excel 學習教練，專門幫助使用 macOS 的學習者從零開始掌握 Excel。

你的教學涵蓋以下 5 大階段、21 個主題：

【Phase 1 — 操作效率（第 1-2 週）】
1. macOS 快捷鍵大全：Command/Option/Control 鍵對應、導航/選取/編輯/格式化快捷鍵、KeyTips
2. 基礎函式：SUM、AVERAGE、COUNT/COUNTA、MAX、MIN、MEDIAN、LARGE/SMALL
3. 條件判斷：IF、IFS、巢狀 IF、AND、OR、NOT、MOD

【Phase 2 — 職場即戰力（第 3-4 週）】
4. 條件統計：COUNTIF/COUNTIFS、SUMIF/SUMIFS、AVERAGEIF/AVERAGEIFS
5. 查找比對：VLOOKUP（限制）、XLOOKUP（推薦）、INDEX+MATCH（萬用）、IFERROR
6. 樞紐分析表：建立樞紐、列/欄/值/篩選 4 大區域、群組、計算欄位、交叉分析篩選器

【Phase 3 — 專業打磨（第 5-6 週）】

9. 文字與日期函式：TRIM、LEFT/MID/RIGHT、FIND/SEARCH、TEXT、DATEDIF、WORKDAY、EOMONTH
10. 圖表設計：圖表類型選擇原則、走勢圖 Sparklines、動態圖表
11. 命名範圍與表格：命名範圍、結構化參照、表格自動展開

13. 陣列與動態函式：FILTER、SORT、UNIQUE、SEQUENCE、TAKE、SUMPRODUCT
14. 進階函式：INDIRECT、OFFSET、LET、AGGREGATE、CHOOSE、SWITCH、LAMBDA
15. 假設分析：目標搜尋、模擬分析表、分析藍本、規劃求解
16. Power Query：ETL 概念、資料匯入/轉換/合併、M 語言
17. Power Pivot 與資料模型：資料模型關聯、DAX 基礎

【Phase 5 — VBA 大師（第 11-14 週）】
18. VBA 基礎：變數、迴圈、條件、儲存格操作（macOS 注意：沒有 Alt+F11，用選單開啟 VBA 編輯器；沒有 UserForm）

教學原則：
1. 永遠用最白話的方式解釋，搭配職場實際情境（如：業績報表、庫存管理、薪資計算）
2. 公式展示用等寬字體，複雜公式要逐層拆解說明

4. 每教完一個函式，給一個「動手試試」的小練習
5. 對話用繁體中文，函式名稱用英文大寫
6. 遇到學生貼公式，幫他分析對錯、效率、是否有更好寫法
7. 適當用 emoji 讓對話有活力但不過多
8. 回答有組織、適當分段，不要太長（除非問題本身很複雜）
9. 提到進階功能時，說明是否需要 Microsoft 365 訂閱（如 XLOOKUP、FILTER 等動態陣列函式）`;

// Mobile sidebar

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ════════════════════════════════════════════════════════
// Sidebar rendering
// ════════════════════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  let currentPhase = 0;

  CHAPTERS.forEach(ch => {
    if (ch.phase !== currentPhase) {
      currentPhase = ch.phase;
      const divider = document.createElement('div');
      divider.className = 'phase-divider';
      divider.textContent = PHASE_NAMES[ch.phase];
      list.appendChild(divider);
    }

    const div = document.createElement('div');
    div.className = 'chapter-item' +
      (currentChapter?.id === ch.id ? ' active' : '') +
      (done.has(ch.id) ? ' done' : '');
    div.innerHTML = `
      <div class="ch-num">${ch.num}</div>
      <div class="ch-title">${ch.emoji} ${ch.title}</div>
      ${done.has(ch.id) ? '<div class="ch-done-badge">&#10003;</div>' : ''}
    `;
    div.onclick = () => { startLesson(ch.id); closeSidebar(); };
    list.appendChild(div);
  });

  const pct = Math.round(done.size / CHAPTERS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').innerText = `${done.size} / ${CHAPTERS.length} 階段`;
}

// ════════════════════════════════════════════════════════
// Lesson & chat
// ════════════════════════════════════════════════════════
function startLesson(chId) {
  const ch = CHAPTERS[chId];
  currentChapter = ch;
  document.getElementById('current-title').innerHTML = `${ch.emoji} ${ch.title} <span>${ch.num}</span>`;

  // Clear previous conversation when switching chapters
  history = [];
  const area = document.getElementById('chat-area');
  area.innerHTML = '';

  renderSidebar();

  const prompt = `我想開始學習「${ch.title}」。請先幫我簡單介紹這個主題在職場上為什麼重要，然後從最基礎的概念開始教我。我是使用 macOS 的 Excel 使用者。`;

  addMessage('user', prompt);
  callAPI(prompt);

  if (ch.phase >= 4) {
    setQuickReplies([
      '📝 給我一個完整範例',
      '🧩 給我一道練習題',
      '🤔 這跟前面學的有什麼關係？',
      '💼 這在職場上怎麼用？'
    ]);
  } else {
    setQuickReplies([
      '📝 給我一個範例',
      '🧩 給我一道練習題',
      '🤔 我還不太懂，再解釋一次',
      '➡️ 教我下一個概念'
    ]);
  }
}

function askQuestion(q) {
  addMessage('user', q);
  callAPI(q);
}

function setQuickReplies(chips) {
  const el = document.getElementById('quick-replies');
  el.innerHTML = '';
  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c;
    btn.onclick = () => askQuestion(c);
    el.appendChild(btn);
  });
}

function addMessage(role, content) {
  const area = document.getElementById('chat-area');

  const wc = area.querySelector('.welcome-card');
  if (wc) wc.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'coach' ? '📊' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = role === 'coach' ? formatMessage(content) : escapeHtml(content);

  if (role === 'coach' && window.speechSynthesis) {
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊 朗讀';
    speakBtn.setAttribute('aria-label', '朗讀此訊息');
    speakBtn.onclick = function() {
      this.classList.toggle('active');
      speakText(content);
    };
    bubble.appendChild(speakBtn);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;

  history.push({ role: role === 'coach' ? 'assistant' : 'user', content });
}

// ════════════════════════════════════════════════════════
// Message formatting
// ════════════════════════════════════════════════════════
function formatMessage(text) {
  // Code blocks with copy button
  text = text.replace(/```(vba|excel|m)?\n?([\s\S]*?)```/g, (_, lang, code) => {
    const label = (lang || '').toUpperCase() || 'CODE';
    const id = 'cb-' + Math.random().toString(36).slice(2, 8);
    return `<div class="code-block-wrap"><span class="lang-label">${label}</span><button class="copy-btn" onclick="copyCode('${id}', this)">Copy</button><pre><code id="${id}">${escapeHtml(code.trim())}</code></pre></div>`;
  });

  // Inline code（content escaped to prevent XSS）
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');

  // Lists — group consecutive <li> into one <ul>
  text = text.replace(/^\- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  text = text.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Quiz box
  text = text.replace(/🧩(.+?)(?=\n\n|\n[^-\s]|$)/gs, (m, c) =>
    `<div class="quiz-box"><div class="quiz-title">🧩 動手試試</div>${c.trim()}</div>`);

  // Highlight box
  text = text.replace(/💡(.+?)(?=\n\n|\n[^\s]|$)/gs, (m, c) =>
    `<div class="highlight-box">💡${c.trim()}</div>`);

  // Line breaks
  text = text.replace(/\n\n/g, '</p><p>');
  text = '<p>' + text + '</p>';
  text = text.replace(/<p><\/p>/g, '');
  text = text.replace(/<p>(<pre|<ul|<h3|<div)/g, '$1');
  text = text.replace(/(<\/pre>|<\/ul>|<\/h3>|<\/div>)<\/p>/g, '$1');

  return text;
}

function copyCode(id, btn) {
  const code = document.getElementById(id);
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn.active').forEach(b => b.classList.remove('active'));
    return;
  }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-TW';
  utt.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => /zh.TW/i.test(v.lang)) || voices.find(v => /^zh/i.test(v.lang));
  if (zhVoice) utt.voice = zhVoice;
  utt.onend = () => document.querySelectorAll('.speak-btn.active').forEach(b => b.classList.remove('active'));
  window.speechSynthesis.speak(utt);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════════════
// API call
// ════════════════════════════════════════════════════════
function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg coach';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="avatar coach">📊</div>
    <div class="bubble">
      <div class="typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function callAPI(userMsg) {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  const messages = [];
  const recentHistory = history.slice(-20);
  recentHistory.forEach(m => {
    if (m.content !== userMsg || m.role !== 'user') {
      messages.push({ role: m.role, content: m.content });
    }
  });
  if (messages.length === 0 || messages[messages.length-1].content !== userMsg) {
    messages.push({ role: 'user', content: userMsg });
  }

  let systemPrompt = SYSTEM_PROMPT;
  if (currentChapter) {
    systemPrompt += `\n\n當前正在學習的章節：${currentChapter.title}（${currentChapter.context}）`;
  }

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    if (!resp.ok) {
      removeTyping();
      const errMap = {
        401: '❌ API 金鑰無效或已過期，請確認金鑰是否正確。',
        429: '⏳ API 額度已用完或請求過於頻繁，請稍後再試。',
        529: '🔧 Anthropic 伺服器目前過載，請稍等片刻再重試。',
      };
      const msg = errMap[resp.status] || `❌ 發生錯誤（HTTP ${resp.status}），請稍後再試。`;
      addMessage('coach', msg);
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const data = await resp.json();
    removeTyping();

    if (data.error) {
      addMessage('coach', '❌ API 錯誤：' + escapeHtml(data.error.message || '未知錯誤'));
    } else {
      const reply = data.content?.[0]?.text || '抱歉，沒有收到回應，請再試一次！';
      addMessage('coach', reply);

      if (currentChapter) {
        setQuickReplies([
          '📝 再給我一個例子',
          '🧩 給我一道練習題',
          '🤔 我有點混淆，再說清楚',
          '➡️ 繼續教下一個概念'
        ]);
      }
    }
  } catch (e) {
    removeTyping();
    if (!navigator.onLine) {
      addMessage('coach', '🌐 網路已斷線，請確認網路連線後再試。');
    } else if (e instanceof TypeError) {
      addMessage('coach', '🌐 無法連線至 API 伺服器，請檢查網路或防火牆設定。');
    } else {
      addMessage('coach', '😅 連線失敗，請重新整理頁面再試一次。');
    }
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

// ════════════════════════════════════════════════════════
// User input
// ════════════════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.style.height = '';
  addMessage('user', text);
  callAPI(text);
  document.getElementById('quick-replies').innerHTML = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  if (!confirm('確定要清除目前對話紀錄嗎？')) return;
  history = [];
  currentChapter = null;
  document.getElementById('current-title').innerHTML = '選擇章節開始學習';
  renderSidebar();
  const area = document.getElementById('chat-area');
  area.innerHTML = `
    <div class="welcome-card">
      <div class="wc-emoji">📊</div>
      <h2>對話已清除！</h2>
      <p>選擇左側章節繼續學習，或直接問我問題</p>
      <div class="start-chips">
        <button class="start-chip" onclick="startLesson(0)">🚀 從頭開始</button>
        <button class="start-chip" onclick="askQuestion('幫我出一道 Excel 練習題')">🧩 給我題目</button>
      </div>
    </div>`;
  document.getElementById('quick-replies').innerHTML = '';
}

function markDone() {
  if (!currentChapter) {
    addMessage('coach', '請先從左側選擇一個章節，學完後再點「學完了！」哦 😊');
    return;
  }
  done.add(currentChapter.id);
  localStorage.setItem('excel_done', JSON.stringify([...done]));
  renderSidebar();

  const nextId = currentChapter.id + 1;
  if (nextId < CHAPTERS.length) {
    const next = CHAPTERS[nextId];
    const phaseChange = next.phase !== currentChapter.phase;
    let msg = `🎉 太棒了！「${currentChapter.title}」已學完！\n\n`;
    if (phaseChange) {
      msg += `🔥 恭喜進入 **${PHASE_NAMES[next.phase]}**！\n\n`;
    }
    msg += `下一個主題是 **${next.emoji} ${next.title}**，要繼續嗎？`;
    addMessage('coach', msg);
    setQuickReplies([`▶️ 繼續學「${next.title}」`, '😌 先休息一下']);
  } else {
    addMessage('coach', `🎊 恭喜你！全部 21 個階段完成！\n\n你已經從 Excel 新手成長為具備 VBA 能力的專業使用者。繼續搭配「互動練習」Excel 檔來驗證你的實力吧！`);
  }
}
