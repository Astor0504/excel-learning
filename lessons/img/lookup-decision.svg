<svg width="520" height="700" viewBox="0 0 520 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LOOKUP 函式選擇決策樹</title>
  <desc id="desc">先判斷是否能用 XLOOKUP，新寫公式優先用 XLOOKUP；維護舊 VLOOKUP 公式時才用 VLOOKUP；舊版、反向查找或避免欄位位移時用 INDEX 加 MATCH。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#756b5d"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#4b3f2f" flood-opacity=".12"/>
    </filter>
  </defs>
  <style>
    .title { font: 700 18px "Noto Sans TC", "PingFang TC", sans-serif; fill: #243527; }
    .text { font: 600 16px "Noto Sans TC", "PingFang TC", sans-serif; fill: #243527; }
    .small { font: 500 13px "Noto Sans TC", "PingFang TC", sans-serif; fill: #5f6b61; }
    .line { fill: none; stroke: #756b5d; stroke-width: 2.4; marker-end: url(#arrow); }
    .tag { font: 700 13px "Noto Sans TC", "PingFang TC", sans-serif; fill: #fff; }
    .yes { fill: #2f8f52; }
    .no { fill: #b85a3e; }
  </style>

  <rect x="8" y="8" width="504" height="684" rx="28" fill="#fbf8f1" stroke="#e0d5c3" stroke-width="2"/>

  <rect x="112" y="28" width="296" height="58" rx="29" fill="#eef6e8" stroke="#cfe1c7" stroke-width="2"/>
  <text class="title" x="260" y="64" text-anchor="middle">查找公式先選工具</text>

  <path class="line" d="M260 86 L260 102"/>
  <path d="M260 102 L356 174 L260 246 L164 174 Z" fill="#fffaf2" stroke="#d9c8ad" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text class="text" x="260" y="164" text-anchor="middle">新寫公式，且</text>
  <text class="text" x="260" y="188" text-anchor="middle">有 XLOOKUP？</text>

  <path class="line" d="M196 218 C154 242 130 252 130 278"/>
  <rect class="yes" x="111" y="235" width="38" height="24" rx="12"/>
  <text class="tag" x="130" y="252" text-anchor="middle">是</text>

  <rect x="28" y="278" width="224" height="136" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text class="title" x="140" y="314" text-anchor="middle" fill="#166534">XLOOKUP</text>
  <text class="small" x="140" y="342" text-anchor="middle">本課首選</text>
  <text class="small" x="140" y="366" text-anchor="middle">查找欄與回傳欄分開寫</text>
  <text class="small" x="140" y="390" text-anchor="middle">可自訂找不到時的結果</text>

  <path class="line" d="M323 218 C360 246 370 264 370 290"/>
  <rect class="no" x="340" y="236" width="38" height="24" rx="12"/>
  <text class="tag" x="359" y="253" text-anchor="middle">否</text>

  <path d="M370 290 L466 362 L370 434 L274 362 Z" fill="#fffaf2" stroke="#d9c8ad" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text class="text" x="370" y="354" text-anchor="middle">正在維護</text>
  <text class="text" x="370" y="378" text-anchor="middle">舊 VLOOKUP？</text>

  <path class="line" d="M425 413 C455 440 455 462 455 486"/>
  <rect class="yes" x="437" y="438" width="38" height="24" rx="12"/>
  <text class="tag" x="456" y="455" text-anchor="middle">是</text>

  <rect x="276" y="488" width="216" height="120" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text class="title" x="384" y="524" text-anchor="middle" fill="#92400e">VLOOKUP</text>
  <text class="small" x="384" y="552" text-anchor="middle">維護舊檔時使用</text>
  <text class="small" x="384" y="576" text-anchor="middle">第四參數要填 FALSE / 0</text>

  <path class="line" d="M316 414 C258 452 154 456 140 486"/>
  <rect class="no" x="230" y="436" width="38" height="24" rx="12"/>
  <text class="tag" x="249" y="453" text-anchor="middle">否</text>

  <rect x="28" y="488" width="224" height="120" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#soft-shadow)"/>
  <text class="title" x="140" y="524" text-anchor="middle" fill="#1e40af">INDEX + MATCH</text>
  <text class="small" x="140" y="552" text-anchor="middle">舊版環境的專業備案</text>
  <text class="small" x="140" y="576" text-anchor="middle">可往左查，也不怕插欄</text>

  <rect x="34" y="632" width="452" height="42" rx="21" fill="#fff" stroke="#e2d8c9" stroke-width="1.5"/>
  <text class="small" x="260" y="658" text-anchor="middle">交付報表要處理 #N/A：XLOOKUP 第 4 參數或 IFERROR</text>
</svg>
